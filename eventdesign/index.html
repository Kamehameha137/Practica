<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои мероприятия · EventDesign</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container">
        <!-- Заголовок страницы -->
        <div class="page-header fade-up">
            <div class="page-header-text">
                <span class="eyebrow">Ваши события</span>
                <h1>Мероприятия, <span class="italic-accent">которые вы создаёте.</span></h1>
            </div>
            <a href="create.html" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Новое мероприятие
            </a>
        </div>

        <!-- Фильтры и поиск -->
        <div class="filters fade-up">
            <div class="search-wrap">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="search" class="search-input" placeholder="Поиск по названию или описанию...">
            </div>

            <div class="filter-chips" id="categoryFilter">
                <button class="chip active" data-category="all">Все</button>
                <button class="chip" data-category="Конференция">Конференция</button>
                <button class="chip" data-category="Корпоратив">Корпоратив</button>
                <button class="chip" data-category="Мастер-класс">Мастер-класс</button>
                <button class="chip" data-category="Свадьба">Свадьба</button>
                <button class="chip" data-category="Презентация">Презентация</button>
            </div>
        </div>

        <!-- Список мероприятий -->
        <div class="events-grid" id="eventsGrid"></div>

        <!-- Пустое состояние -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">◌</div>
            <h3>Мероприятий пока нет</h3>
            <p style="margin-bottom: 24px;">Создайте первое мероприятие, чтобы начать планировать</p>
            <a href="create.html" class="btn btn-primary">
                Создать мероприятие
            </a>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Проверка авторизации
        const user = UI.requireAuth();
        if (!user) throw new Error('Not authenticated');

        // Рендер навбара
        document.getElementById('navbar-container').innerHTML = UI.renderNavbar('events');
        UI.updateThemeIcon(Storage.getTheme());

        let currentCategory = 'all';
        let currentSearch = '';

        // Рендер карточки мероприятия
        function renderEventCard(event) {
            const status = UI.getEventStatus(event);
            const statusLabel = UI.getStatusLabel(status);
            return `
                <div class="event-card" onclick="window.location.href='create.html?id=${event.id}'">
                    <div class="event-card-header">
                        <span class="event-category">${event.category}</span>
                        <button class="event-menu" onclick="event.stopPropagation(); deleteEvent(${event.id})" title="Удалить">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            </svg>
                        </button>
                    </div>

                    <h3 class="event-title">${event.title}</h3>
                    <p class="event-description">${event.description || 'Без описания'}</p>

                    <div class="event-meta">
                        <div class="event-meta-row">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            ${UI.formatDate(event.date)}${event.time ? ', ' + event.time : ''}
                        </div>
                        <div class="event-meta-row">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                                <circle cx="12" cy="10" r="3"/>
                            </svg>
                            ${event.location || 'Место не указано'}
                        </div>
                        <div class="event-meta-row" style="justify-content: space-between;">
                            <span class="event-status status-${status}">${statusLabel}</span>
                            ${event.capacity ? `<span style="color: var(--text-muted); font-size: 0.8rem;">${event.capacity} мест</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // Рендер списка
        function renderEvents() {
            let events = Storage.getUserEvents();

            // Фильтрация
            if (currentCategory !== 'all') {
                events = events.filter(e => e.category === currentCategory);
            }
            if (currentSearch) {
                const q = currentSearch.toLowerCase();
                events = events.filter(e =>
                    e.title.toLowerCase().includes(q) ||
                    (e.description && e.description.toLowerCase().includes(q))
                );
            }

            // Сортировка по дате — сначала ближайшие предстоящие
            events.sort((a, b) => new Date(a.date) - new Date(b.date));

            const grid = document.getElementById('eventsGrid');
            const emptyState = document.getElementById('emptyState');

            if (events.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
            } else {
                grid.style.display = 'grid';
                emptyState.style.display = 'none';
                grid.innerHTML = events.map(renderEventCard).join('');
            }
        }

        // Удаление
        function deleteEvent(id) {
            UI.confirm('Удалить мероприятие?', 'Это действие нельзя отменить.', () => {
                Storage.deleteEvent(id);
                UI.toast('Мероприятие удалено');
                renderEvents();
            });
        }

        // Фильтры
        document.getElementById('categoryFilter').addEventListener('click', (e) => {
            if (!e.target.classList.contains('chip')) return;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            currentCategory = e.target.dataset.category;
            renderEvents();
        });

        // Поиск
        document.getElementById('search').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderEvents();
        });

        renderEvents();
    </script>
</body>
</html>
